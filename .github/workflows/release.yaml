# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            bundle_base: target/aarch64-apple-darwin/release/bundle
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            bundle_base: target/x86_64-apple-darwin/release/bundle
          - platform: ubuntu-22.04
            args: ""
            bundle_base: target/release/bundle

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: jdx/mise-action@v3
        with:
          version: 2026.3.9

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Satfolio v__VERSION__"
          releaseBody: |
            See the [full changelog](https://github.com/guillevc/satfolio/compare/v...v__VERSION__) or edit this draft to add release notes before publishing.

            ## Install

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Satfolio_v__VERSION___aarch64.dmg` |
            | macOS (Intel) | `Satfolio_v__VERSION___x64.dmg` |
            | Linux (x64) | `.deb`, `.rpm`, or `.AppImage` |

            ### macOS installation

            1. Open the `.dmg` and drag Satfolio to Applications
            2. Try to open it — macOS will block it
            3. Go to **System Settings → Privacy & Security**
            4. Scroll down — you'll see a message about Satfolio being blocked
            5. Click **Open Anyway** and confirm with your password

            This is only needed once. Alternatively:

            ```sh
            xattr -d com.apple.quarantine /Applications/Satfolio.app
            ```

            See the [README](https://github.com/guillevc/satfolio#macos-installation) for details.

            ## Verify this release

            Every artifact is built in public CI and attested with [GitHub Artifact Attestations](https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations) (SLSA Build L2).

            ```sh
            # Check file integrity
            shasum -a 256 --check SHA256SUMS.txt

            # Verify build provenance (requires GitHub CLI)
            gh attestation verify <filename> --owner guillevc
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attest DMG provenance
        if: matrix.platform == 'macos-latest'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.bundle_base }}/dmg/*.dmg

      - name: Attest DEB provenance
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.bundle_base }}/deb/*.deb

      - name: Attest RPM provenance
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.bundle_base }}/rpm/*.rpm

      - name: Attest AppImage provenance
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.bundle_base }}/appimage/*.AppImage

      - name: Generate checksums
        env:
          BUNDLE_BASE: ${{ matrix.bundle_base }}
        run: |
          cd "$BUNDLE_BASE"
          find . -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
            -exec shasum -a 256 {} + | sed 's|  \./|  |' > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.platform }}-${{ join(matrix.args, '-') }}
          path: ${{ matrix.bundle_base }}/checksums.txt

  checksums:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download all checksum artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: checksums-*
          merge-multiple: true

      - name: Combine checksums
        run: sort checksums.txt > SHA256SUMS.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" SHA256SUMS.txt --clobber --repo "$GITHUB_REPOSITORY"

      - name: Attest checksums provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: SHA256SUMS.txt
