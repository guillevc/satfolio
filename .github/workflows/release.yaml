# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            bundle_base: target/aarch64-apple-darwin/release/bundle
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            bundle_base: target/x86_64-apple-darwin/release/bundle
          - platform: ubuntu-22.04
            args: ""
            bundle_base: target/release/bundle

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: jdx/mise-action@v3
        with:
          version: 2026.3.9

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - run: pnpm install

      - name: Generate release body
        id: release-body
        run: |
          tmp=$(mktemp)
          git-cliff --current --strip all > "$tmp"
          cat >> "$tmp" <<'EOF'

          ---

          ## Install

          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | `Satfolio___VERSION___aarch64.dmg` |
          | macOS (Intel) | `Satfolio___VERSION___x64.dmg` |
          | Linux (x64 .deb) | `Satfolio___VERSION___amd64.deb` |
          | Linux (x64 .rpm) | `Satfolio-__VERSION__-1.x86_64.rpm` |
          | Linux (x64 .AppImage) | `Satfolio___VERSION___amd64.AppImage` |

          ### macOS

          > [!NOTE]
          > macOS shows a warning because Satfolio isn't signed through Apple's paid developer program. The app is open source and every release is verifiably built from this repo — see [Security & trust](https://github.com/guillevc/satfolio#security--trust).

          1. Open the `.dmg` and drag Satfolio to **Applications**
          2. Try to open Satfolio — macOS will show a warning and block it
          3. Open **System Settings → Privacy & Security**
          4. Under Security, click **Open Anyway**
          5. Enter your login password and click **OK**

          This is only needed once — after that, Satfolio opens normally. See [Apple's support page](https://support.apple.com/guide/mac-help/open-a-mac-app-from-an-unknown-developer-mh40616/mac) for more details.

          Alternatively, run this in Terminal:

          ```sh
          xattr -d com.apple.quarantine /Applications/Satfolio.app
          ```

          ## Verify this release

          Every artifact is built in public CI and cryptographically signed via [Sigstore](https://www.sigstore.dev) through GitHub Actions. Release artifacts include SHA-256 checksums and [build provenance attestations](https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations) so you can verify exactly how each binary was built.

          ```sh
          # verify your download hasn't been tampered with
          shasum -a 256 --check SHA256SUMS.txt

          # verify the binary was built from this repo's source code (requires GitHub CLI)
          gh attestation verify Satfolio___VERSION___aarch64.dmg --owner guillevc
          gh attestation verify Satfolio___VERSION___x64.dmg --owner guillevc
          gh attestation verify Satfolio___VERSION___amd64.deb --owner guillevc
          gh attestation verify Satfolio-__VERSION__-1.x86_64.rpm --owner guillevc
          gh attestation verify Satfolio___VERSION___amd64.AppImage --owner guillevc
          ```
          EOF
          {
            echo "body<<RELEASE_BODY_EOF"
            cat "$tmp"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Satfolio v__VERSION__"
          releaseBody: ${{ steps.release-body.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attest DMG provenance
        if: matrix.platform == 'macos-latest'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.bundle_base }}/dmg/*.dmg

      - name: Attest DEB provenance
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.bundle_base }}/deb/*.deb

      - name: Attest RPM provenance
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.bundle_base }}/rpm/*.rpm

      - name: Attest AppImage provenance
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.bundle_base }}/appimage/*.AppImage

      - name: Generate checksums
        env:
          BUNDLE_BASE: ${{ matrix.bundle_base }}
        run: |
          cd "$BUNDLE_BASE"
          find . -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
            -exec shasum -a 256 {} + | sed 's|  \./|  |' > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.platform }}-${{ join(matrix.args, '-') }}
          path: ${{ matrix.bundle_base }}/checksums.txt

  checksums:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download all checksum artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: checksums-*
          merge-multiple: true

      - name: Combine checksums
        run: sort checksums.txt > SHA256SUMS.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" SHA256SUMS.txt --clobber --repo "$GITHUB_REPOSITORY"

      - name: Attest checksums provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: SHA256SUMS.txt
