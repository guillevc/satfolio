# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            bundle_base: src-tauri/target/aarch64-apple-darwin/release/bundle
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            bundle_base: src-tauri/target/x86_64-apple-darwin/release/bundle
          - platform: ubuntu-22.04
            args: ""
            bundle_base: src-tauri/target/release/bundle

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: jdx/mise-action@v3
        with:
          version: 2026.3.9

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Satfolio v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            ${{ matrix.bundle_base }}/dmg/*.dmg
            ${{ matrix.bundle_base }}/deb/*.deb
            ${{ matrix.bundle_base }}/appimage/*.AppImage

      - name: Generate checksums
        env:
          BUNDLE_BASE: ${{ matrix.bundle_base }}
        run: |
          cd "$BUNDLE_BASE"
          find . -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' \) \
            -exec shasum -a 256 {} + | sed 's|  \./|  |' > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.platform }}-${{ join(matrix.args, '-') }}
          path: ${{ matrix.bundle_base }}/checksums.txt

  checksums:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download all checksum artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: checksums-*
          merge-multiple: true

      - name: Combine checksums
        run: sort checksums.txt > SHA256SUMS.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" SHA256SUMS.txt --clobber --repo "$GITHUB_REPOSITORY"

      - name: Attest checksums provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: SHA256SUMS.txt
