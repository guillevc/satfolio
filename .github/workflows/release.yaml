# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            bundle_base: target/aarch64-apple-darwin/release/bundle
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            bundle_base: target/x86_64-apple-darwin/release/bundle
          - platform: ubuntu-22.04
            args: ""
            bundle_base: target/release/bundle

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.9

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - run: pnpm install

      - name: Find previous tag
        id: prev-tag
        run: |
          prev=$(git tag --list 'v*' --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          echo "tag=${prev:-}" >> "$GITHUB_OUTPUT"

      - name: Generate release body
        id: release-body
        run: |
          tmp=$(mktemp)
          git-cliff --current --config .github/cliff-release.toml > "$tmp"
          echo "" >> "$tmp"
          cat .github/release-body.md >> "$tmp"
          PREV_TAG="${{ steps.prev-tag.outputs.tag }}"
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_LINE="**Full Changelog**: https://github.com/guillevc/satfolio/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
          else
            CHANGELOG_LINE="**Full Changelog**: https://github.com/guillevc/satfolio/commits/${GITHUB_REF_NAME}"
          fi
          echo -e "\n---\n\nBuilt by @guillevc · ${CHANGELOG_LINE}" >> "$tmp"
          {
            echo "body<<RELEASE_BODY_EOF"
            cat "$tmp"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Satfolio v__VERSION__"
          releaseBody: ${{ steps.release-body.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attest macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{ matrix.bundle_base }}/dmg/*.dmg
            ${{ matrix.bundle_base }}/macos/*.tar.gz
            ${{ matrix.bundle_base }}/macos/*.tar.gz.sig

      - name: Attest Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{ matrix.bundle_base }}/deb/*.deb
            ${{ matrix.bundle_base }}/rpm/*.rpm
            ${{ matrix.bundle_base }}/appimage/*.AppImage
            ${{ matrix.bundle_base }}/appimage/*.tar.gz
            ${{ matrix.bundle_base }}/appimage/*.tar.gz.sig

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release edit "$TAG" --draft=false --latest
          echo "Published release ${TAG} as latest"
